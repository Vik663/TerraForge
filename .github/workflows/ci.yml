name: TerraForge CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  logic-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore TerraForge.sln

    - name: Build
      run: dotnet build TerraForge.sln --configuration Release --no-restore

    - name: Test (logic only)
      run: >
        dotnet test TerraForge.Tests
        --configuration Release
        --no-build
        --collect:"XPlat Code Coverage"
        --results-directory ./TestResults

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:"TestResults/**/coverage.cobertura.xml" \
          -targetdir:"CoverageReport" \
          -reporttypes:"Html;JsonSummary"

    - name: Extract coverage percent
      id: coverage
      run: |
        value=$(jq '.summary.linecoverage' CoverageReport/Summary.json)
        echo "percent=$value" >> $GITHUB_OUTPUT

    - name: Prepare gh-pages folder
      run: |
        mkdir -p ./public
        cp -r CoverageReport ./public/
        percent=${{ steps.coverage.outputs.percent }}
        color="red"
        if (( $(echo "$percent > 80" | bc -l) )); then color="green"; fi
        if (( $(echo "$percent > 50" | bc -l) )); then color="yellow"; fi
        echo "<svg xmlns='http://www.w3.org/2000/svg' width='120' height='20'>
        <rect width='60' height='20' fill='#555'/>
        <rect x='60' width='60' height='20' fill='$color'/>
        <text x='30' y='14' fill='#fff' font-family='Verdana' font-size='11' text-anchor='middle'>coverage</text>
        <text x='90' y='14' fill='#fff' font-family='Verdana' font-size='11' text-anchor='middle'>$percent%</text>
        </svg>" > ./public/coverage-badge.svg

    - name: Publish to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./public
        publish_branch: gh-pages
        keep_files: true


  rendering-tests:
    runs-on: windows-latest
    needs: logic-tests

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore TerraForge.sln

    - name: Build
      run: dotnet build TerraForge.sln --configuration Release --no-restore

    - name: Test (rendering)
      run: dotnet test TerraForge.Rendering.Skia.Tests --configuration Release --no-build
