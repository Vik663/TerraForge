name: TerraForge CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  logic-tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore TerraForge.sln

    - name: Build
      run: dotnet build TerraForge.sln --configuration Release --no-restore

    - name: Run analyzers
      run: dotnet format --verify-no-changes
      continue-on-error: true

    - name: Test (logic only)
      run: >
        dotnet test TerraForge.Tests
        --configuration Release
        --no-build
        --collect:"XPlat Code Coverage"
        --results-directory ./TestResults

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:"TestResults/**/coverage.cobertura.xml" \
          -targetdir:"CoverageReport" \
          -reporttypes:"Html;JsonSummary"

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: CoverageReport
        path: CoverageReport

    - name: Upload test results
      uses: actions/upload-artifact@v4
      with:
        name: TestResults
        path: TestResults

    - name: Generate coverage badge
      uses: action-badges/core@v1
      with:
        label: coverage
        message: ${{ fromJson(steps.coverage.outputs.summary).coverage }}
        color: green
        path: coverage-badge.svg

    - name: Upload coverage badge
      uses: actions/upload-artifact@v4
      with:
        name: CoverageBadge
        path: coverage-badge.svg


  rendering-tests:
    runs-on: windows-latest
    needs: logic-tests

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore TerraForge.sln

    - name: Build
      run: dotnet build TerraForge.sln --configuration Release --no-restore

    - name: Test (rendering)
      run: dotnet test TerraForge.Rendering.Skia.Tests --configuration Release --no-build
