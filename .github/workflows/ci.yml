name: TerraForge Coverage Debug

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  linux-coverage:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Run logic tests with Coverlet
      run: |
        mkdir -p LinuxCoverage
        dotnet test TerraForge.Tests \
          --configuration Release \
          /p:CollectCoverage=true \
          /p:CoverletOutputFormat=cobertura \
          /p:CoverletOutput=LinuxCoverage/coverage.xml

    - name: Show LinuxCoverage contents
      run: |
        echo "LinuxCoverage directory:"
        ls -R LinuxCoverage || true
        echo "First 20 lines of coverage.xml:"
        head -n 20 LinuxCoverage/coverage.xml || true

    - name: Upload Linux coverage
      uses: actions/upload-artifact@v4
      with:
        name: LinuxCoverage
        path: LinuxCoverage


  windows-coverage:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Run rendering tests with Coverlet
      run: |
        New-Item -ItemType Directory -Force -Path "WinCoverage" | Out-Null
        dotnet test TerraForge.Rendering.Skia.Tests `
          --configuration Release `
          /p:CollectCoverage=true `
          /p:CoverletOutputFormat=cobertura `
          /p:CoverletOutput="WinCoverage/coverage.xml"

    - name: Show WinCoverage contents
      run: |
        Write-Host "WinCoverage directory:"
        Get-ChildItem WinCoverage -Recurse
        Write-Host "First 20 lines of coverage.xml:"
        Get-Content WinCoverage/coverage.xml -TotalCount 20

    - name: Upload Windows coverage
      uses: actions/upload-artifact@v4
      with:
        name: WinCoverage
        path: WinCoverage
